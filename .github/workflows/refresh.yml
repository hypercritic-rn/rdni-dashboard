name: refresh
  "on":
    workflow_dispatch:
    schedule:
      - cron: "30 2 * * *"
  permissions:
    contents: write
  jobs:
    refresh:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-python@v5
          with:
            python-version: "3.11"
        - name: Regenerate dashboard
          env:
            METABASE_KEY: ${{ secrets.METABASE_KEY }}
          run: python gen.py
        - name: Commit if changed
          run: |
            git config user.name "rdni-bot"
            git config user.email "actions@users.noreply.github.com"
            git add index.html
            git diff --staged --quiet || git commit -m "auto-refresh"
            git push
